<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szemöldök detektor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 1rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 1rem; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .upload-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: background .15s; }
  .upload-zone:hover { background: #f9f9f9; }
  .upload-zone p { color: #666; font-size: 15px; margin-top: 8px; }
  #fileIn { display: none; }
  #status { font-size: 14px; color: #555; margin: .5rem 0; min-height: 20px; }
  #canvasWrap { position: relative; display: none; }
  canvas { display: block; max-width: 100%; border-radius: 8px; }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: .75rem; font-size: 13px; }
  .leg { display: flex; align-items: center; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  button { padding: .45rem 1rem; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 14px; margin-top: .75rem; margin-right: 6px; }
  button:hover { background: #f0f0f0; }
  button.primary { background: #7c6fcd; color: #fff; border-color: #7c6fcd; }
  button.primary:hover { background: #6558b5; }
  #debugInfo { font-size: 12px; color: #888; margin-top: .5rem; font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>Szemöldök detektor – arc landmark teszt</h1>

<div class="card" id="uploadCard">
  <div class="upload-zone" onclick="document.getElementById('fileIn').click()">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5" style="margin:0 auto;display:block"><path d="M12 16V8m0 0-3 3m3-3 3 3"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
    <p>Kattints ide és tölts fel egy selfiet vagy arcképet</p>
    <p style="font-size:13px;margin-top:4px;color:#aaa">JPG vagy PNG</p>
  </div>
  <input type="file" id="fileIn" accept="image/*">
</div>

<div id="status"></div>

<div class="card" id="resultCard" style="display:none">
  <div id="canvasWrap">
    <canvas id="main"></canvas>
    <canvas id="overlay"></canvas>
  </div>

  <div class="legend">
    <div class="leg"><div class="dot" style="background:#00ff88"></div>Bal szemöldök (10 pont)</div>
    <div class="leg"><div class="dot" style="background:#ff6b6b"></div>Jobb szemöldök (10 pont)</div>
    <div class="leg"><div class="dot" style="background:#4488ff"></div>Szemek</div>
    <div class="leg"><div class="dot" style="background:#ffaa00"></div>Orr</div>
  </div>

  <div>
    <button class="primary" onclick="toggleOverlay()">Pontok be/ki</button>
    <button onclick="resetAll()">Új fotó</button>
  </div>

  <div id="debugInfo"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script>
// Landmark indexek MediaPipe Face Mesh-ben
const LEFT_BROW  = [70, 63, 105, 66, 107, 55, 65, 52, 53, 46];
const RIGHT_BROW = [300, 293, 334, 296, 336, 285, 295, 282, 283, 276];
const LEFT_EYE   = [33, 7, 163, 144, 145, 153, 154, 155, 133, 246];
const RIGHT_EYE  = [362, 382, 381, 380, 374, 373, 390, 249, 263, 466];
const NOSE_TIP   = [1, 2, 98, 327];

let landmarks = null;
let imgEl = null;
let showOverlay = true;

function setStatus(msg, color) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = color || '#555';
}

function drawLandmarks(lms, W, H) {
  const oc = document.getElementById('overlay');
  const ctx = oc.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  function drawGroup(pts, color, radius) {
    pts.forEach(i => {
      const x = lms[i].x * W;
      const y = lms[i].y * H;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    });
  }

  // Szemöldök terület kiemelése (konvex hull szerű)
  function drawBrowArea(pts, color) {
    const coords = pts.map(i => ({ x: lms[i].x * W, y: lms[i].y * H }));
    // Felső vonal bal→jobb
    const sorted = [...coords].sort((a, b) => a.x - b.x);
    ctx.beginPath();
    ctx.moveTo(sorted[0].x, sorted[0].y);
    sorted.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Pontok
    drawGroup(pts, color, 3);
  }

  drawGroup(LEFT_EYE, 'rgba(68,136,255,0.8)', 2.5);
  drawGroup(RIGHT_EYE, 'rgba(68,136,255,0.8)', 2.5);
  drawGroup(NOSE_TIP, 'rgba(255,170,0,0.8)', 3);
  drawBrowArea(LEFT_BROW, 'rgba(0,255,136,0.9)');
  drawBrowArea(RIGHT_BROW, 'rgba(255,107,107,0.9)');

  // Szemöldök középpont kiemelése
  function centroid(pts) {
    let x = 0, y = 0;
    pts.forEach(i => { x += lms[i].x * W; y += lms[i].y * H; });
    return { x: x / pts.length, y: y / pts.length };
  }

  const lc = centroid(LEFT_BROW);
  const rc = centroid(RIGHT_BROW);

  ctx.beginPath();
  ctx.arc(lc.x, lc.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,255,136,1)';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(rc.x, rc.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,107,107,1)';
  ctx.fill();
}

function buildDebugInfo(lms, W, H) {
  function centroid(pts) {
    let x = 0, y = 0;
    pts.forEach(i => { x += lms[i].x * W; y += lms[i].y * H; });
    return { x: Math.round(x / pts.length), y: Math.round(y / pts.length) };
  }
  function span(pts) {
    let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
    pts.forEach(i => {
      minX = Math.min(minX, lms[i].x * W); maxX = Math.max(maxX, lms[i].x * W);
      minY = Math.min(minY, lms[i].y * H); maxY = Math.max(maxY, lms[i].y * H);
    });
    return { w: Math.round(maxX - minX), h: Math.round(maxY - minY) };
  }
  const lc = centroid(LEFT_BROW);
  const rc = centroid(RIGHT_BROW);
  const ls = span(LEFT_BROW);
  const rs = span(RIGHT_BROW);
  document.getElementById('debugInfo').textContent =
    `Bal szemöldök  → középpont: (${lc.x}, ${lc.y})  méret: ${ls.w}×${ls.h}px\n` +
    `Jobb szemöldök → középpont: (${rc.x}, ${rc.y})  méret: ${rs.w}×${rs.h}px\n` +
    `Kép mérete: ${W}×${H}px  |  Landmarkok: ${lms.length} pont`;
}

function toggleOverlay() {
  showOverlay = !showOverlay;
  const oc = document.getElementById('overlay');
  oc.style.display = showOverlay ? '' : 'none';
}

function resetAll() {
  landmarks = null; imgEl = null;
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('uploadCard').style.display = 'block';
  document.getElementById('status').textContent = '';
  document.getElementById('fileIn').value = '';
}

async function runDetection(img, W, H) {
  setStatus('MediaPipe betöltése és arcfelismerés fut...');
  return new Promise(resolve => {
    try {
      const faceMesh = new FaceMesh({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
      });
      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.3,
        minTrackingConfidence: 0.3
      });
      faceMesh.onResults(results => {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
          landmarks = results.multiFaceLandmarks[0];
          setStatus(`✓ Arc megtalálva! ${landmarks.length} landmark detektálva. Szemöldök pozíciók kiszámítva.`, '#2a9d5c');
          drawLandmarks(landmarks, W, H);
          buildDebugInfo(landmarks, W, H);
        } else {
          setStatus('⚠ Arc nem található a képen. Próbálj egy jobb megvilágítású, szemből készült fotót.', '#cc6600');
        }
        resolve();
      });
      faceMesh.send({ image: img }).catch(err => {
        setStatus('⚠ Detekció hiba: ' + err.message, '#cc0000');
        resolve();
      });
    } catch (e) {
      setStatus('⚠ MediaPipe inicializálási hiba: ' + e.message, '#cc0000');
      resolve();
    }
  });
}

document.getElementById('fileIn').onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  setStatus('Kép betöltése...');
  document.getElementById('uploadCard').style.display = 'none';
  document.getElementById('resultCard').style.display = 'block';

  imgEl = new Image();
  imgEl.onload = async function() {
    const maxW = Math.min(640, window.innerWidth - 40);
    const ratio = Math.min(1, maxW / imgEl.width);
    const W = Math.round(imgEl.width * ratio);
    const H = Math.round(imgEl.height * ratio);

    const mc = document.getElementById('main');
    const oc = document.getElementById('overlay');
    mc.width = W; mc.height = H;
    oc.width = W; oc.height = H;
    oc.style.width = mc.style.width = W + 'px';
    oc.style.height = mc.style.height = H + 'px';

    document.getElementById('canvasWrap').style.display = 'block';
    mc.getContext('2d').drawImage(imgEl, 0, 0, W, H);

    await runDetection(imgEl, W, H);
  };
  imgEl.src = URL.createObjectURL(file);
};
</script>
</body>
</html>
